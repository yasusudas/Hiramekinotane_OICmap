<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Inter+Tight:wght@500;700;800;900&display=swap" />
    <link rel="icon" href="/icon/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/icon/favicon.png" />
    <link rel="apple-touch-icon" href="/icon/favicon.png" />
    <meta name="robots" content="noindex,nofollow" />
    <title>編集ページログイン</title>
    <style>
      @font-face {
        font-family: "Noto Sans JP";
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src:
          url("/fonts/NotoSansJP-VariableFont_wght.ttf") format("truetype-variations"),
          url("/fonts/NotoSansJP-VariableFont_wght.ttf") format("truetype");
      }

      :root {
        --crimson-500: #991c27;
        --crimson-600: #7e1620;
        --ink-900: #0b1220;
        color: var(--ink-900);
        background:
          radial-gradient(120% 60% at 50% -10%, rgba(153, 28, 39, 0.045), transparent 60%),
          linear-gradient(180deg, #f6f7fa 0%, #eef0f5 100%);
        font-family: "Inter Tight", "Inter", "Noto Sans JP", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .login-card {
        width: min(100%, 460px);
        padding: 30px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow:
          0 30px 60px rgba(11, 18, 32, 0.12),
          inset 0 0 0 1px rgba(153, 28, 39, 0.08);
      }

      .login-eyebrow {
        margin: 0 0 10px;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--crimson-600);
      }

      .login-title {
        margin: 0 0 10px;
        font-size: clamp(1.5rem, 3vw, 1.95rem);
        font-weight: 900;
        letter-spacing: -0.012em;
      }

      .login-copy {
        margin: 0 0 18px;
        line-height: 1.8;
        color: rgba(11, 18, 32, 0.74);
      }

      .login-form {
        display: grid;
        gap: 12px;
      }

      .login-label {
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        color: rgba(11, 18, 32, 0.7);
      }

      .login-input {
        width: 100%;
        border: 0;
        outline: none;
        padding: 14px 16px;
        border-radius: 16px;
        background: #fff;
        box-shadow:
          inset 0 0 0 1px rgba(153, 28, 39, 0.14),
          0 12px 24px rgba(11, 18, 32, 0.06);
        font: inherit;
        color: var(--ink-900);
      }

      .login-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }

      .login-submit,
      .login-link {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 800;
        letter-spacing: 0.04em;
        transition:
          transform 220ms cubic-bezier(0.16, 1, 0.3, 1),
          box-shadow 220ms cubic-bezier(0.16, 1, 0.3, 1),
          background-color 120ms cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 1px 2px rgba(11, 18, 32, 0.04);
      }

      .login-submit {
        background: var(--crimson-500);
        color: #fff;
        cursor: pointer;
      }

      @media (hover: hover) and (pointer: fine) {
        .login-submit:not(:disabled):hover {
          background: var(--crimson-600);
          transform: translateY(-2px);
          box-shadow:
            0 12px 22px rgba(153, 28, 39, 0.22),
            0 4px 8px rgba(153, 28, 39, 0.14);
        }
      }

      .login-submit:active {
        transform: translateY(0);
      }

      .login-submit:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .login-link {
        display: inline-flex;
        align-items: center;
        background: rgba(11, 18, 32, 0.08);
        color: var(--ink-900);
        text-decoration: none;
      }

      @media (hover: hover) and (pointer: fine) {
        .login-link:hover {
          background: rgba(11, 18, 32, 0.12);
          transform: translateY(-2px);
          box-shadow:
            0 12px 22px rgba(11, 18, 32, 0.14),
            0 4px 8px rgba(11, 18, 32, 0.08);
        }
      }

      .login-error {
        min-height: 1.2rem;
        margin: 0;
        color: var(--crimson-600);
        font-size: 0.9rem;
        font-weight: 700;
      }

      .login-top-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .lang-toggle {
        min-width: 92px;
        min-height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border: 0;
        border-radius: 8px;
        padding: 6px 4px;
        background: transparent;
        box-shadow: none;
        color: var(--ink-900);
        cursor: pointer;
        font: inherit;
        font-size: 1.32rem;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
      }

      .lang-toggle-option {
        color: rgba(11, 18, 32, 0.28);
        transition: color 140ms ease;
      }

      .lang-toggle-option.is-active,
      .lang-toggle-separator {
        color: var(--ink-900);
      }

      @media (hover: hover) and (pointer: fine) {
        .lang-toggle-option:hover {
          color: var(--ink-900);
        }
      }

      .lang-toggle:focus-visible {
        outline: 2px solid rgba(153, 28, 39, 0.42);
        outline-offset: 2px;
      }
    </style>
    <script>
      const isFileMode = window.location.protocol === 'file:';
      const EDITOR_AUTH_STORAGE_KEY = 'rits-oic-map-editor-auth-v1';
      const EDITOR_PASSWORD_HASH = '28938b7634b78374faa952fc48e30ecb9336ec498a7e3351e56ee4b5db4d489c';

      function resolveNextPath() {
        const next = new URLSearchParams(window.location.search).get('next');
        return next && next.startsWith('/') ? next : '/editor/';
      }

      async function sha256Hex(value) {
        const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(value));
        return Array.from(new Uint8Array(digest))
          .map((byte) => byte.toString(16).padStart(2, '0'))
          .join('');
      }

      if (isFileMode) {
        document.addEventListener('DOMContentLoaded', () => {
          const normalizeLang = (value) => {
            const lang = String(value ?? '').trim().toLowerCase();
            if (lang === 'ja' || lang.startsWith('ja-')) return 'ja';
            if (lang === 'en' || lang.startsWith('en-')) return 'en';
            return null;
          };
          const readBrowserLang = () => {
            const languages = navigator.languages?.length ? navigator.languages : [navigator.language];
            return languages.map(normalizeLang).find(Boolean) ?? 'ja';
          };
          const lang = normalizeLang(localStorage.getItem('oicmap:lang')) ?? readBrowserLang();
          const fileModeText = {
            ja: {
              title: '編集ページログイン',
              copy:
                'このログイン画面はローカルサーバー経由で開く必要があります。<code>npm run dev</code> のあと <code>http://127.0.0.1:5173/editor/login/</code> を開いてください。'
            },
            en: {
              title: 'Editor Login',
              copy:
                'This login page must be opened through a local server. After running <code>npm run dev</code>, open <code>http://127.0.0.1:5173/editor/login/</code>.'
            }
          }[lang];

          document.documentElement.lang = lang;
          document.body.innerHTML = `
            <main style="min-height:100vh;display:grid;place-items:center;margin:0;padding:24px;background:linear-gradient(180deg,#f6f7fa 0%,#eef0f5 100%);font-family:'Inter Tight','Inter','Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;color:#0b1220;">
              <section style="max-width:720px;padding:28px;border-radius:24px;background:rgba(255,255,255,0.92);box-shadow:0 24px 50px rgba(11,18,32,0.12);">
                <h1 style="margin:0 0 16px;font-size:2rem;letter-spacing:-0.022em;">${fileModeText.title}</h1>
                <p style="margin:0;line-height:1.8;">${fileModeText.copy}</p>
              </section>
            </main>
          `;
        });
      } else {
        document.addEventListener('DOMContentLoaded', () => {
          const nextPath = resolveNextPath();
          const form = document.querySelector('#editor-login-form');
          const passwordInput = document.querySelector('#editor-login-password');
          const errorMessage = document.querySelector('#editor-login-error');
          const submitButton = document.querySelector('#editor-login-submit');

          if (sessionStorage.getItem(EDITOR_AUTH_STORAGE_KEY) === 'granted') {
            window.location.replace(nextPath);
            return;
          }

          form?.addEventListener('submit', async (event) => {
            event.preventDefault();
            if (!passwordInput || !errorMessage || !submitButton) {
              return;
            }

            errorMessage.textContent = '';
            submitButton.disabled = true;

            try {
              const passwordHash = await sha256Hex(passwordInput.value);

              if (passwordHash !== EDITOR_PASSWORD_HASH) {
                errorMessage.textContent = window.OIC_I18N?.t('login.error.incorrect') ?? 'パスワードが違います。';
                passwordInput.select();
                return;
              }

              sessionStorage.setItem(EDITOR_AUTH_STORAGE_KEY, 'granted');
              passwordInput.value = '';
              window.location.replace(nextPath);
            } finally {
              submitButton.disabled = false;
            }
          });

          passwordInput?.focus();
        });
      }
    </script>
    <script type="module">
      import { inject } from '@vercel/analytics';
      inject({ mode: import.meta.env.DEV ? 'development' : 'production' });
    </script>
    <script type="module" src="/src/i18n.js"></script>
  </head>
  <body data-app-mode="login">
    <main class="login-card" aria-label="編集ページログイン" data-i18n-aria="login.aria">
      <p class="login-eyebrow">EDITOR ACCESS</p>
      <div class="login-top-row">
        <h1 class="login-title" data-i18n="login.title">編集ページにログイン</h1>
        <button class="lang-toggle" data-lang-toggle type="button" aria-label="英語に切り替え">EN</button>
      </div>
      <form id="editor-login-form" class="login-form">
        <label class="login-label" for="editor-login-password" data-i18n="login.password">パスワード</label>
        <input
          id="editor-login-password"
          class="login-input"
          type="password"
          name="password"
          autocomplete="current-password"
          required
        />
        <div class="login-actions">
          <button id="editor-login-submit" class="login-submit" type="submit" data-i18n="login.submit">ログイン</button>
          <a class="login-link" href="/" data-i18n="login.back">閲覧用サイトへ戻る</a>
        </div>
        <p id="editor-login-error" class="login-error" aria-live="polite"></p>
      </form>
    </main>
  </body>
</html>
